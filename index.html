<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LearnLite</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f4f3ee;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .shell {
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e5e3db;
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }

    .header {
      background: #fff;
      border-bottom: 1px solid #e5e3db;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: #1D9E75;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .header h1 {
      font-family: 'Lora', serif;
      font-size: 15px;
      font-weight: 500;
      color: #1a1a18;
    }

    .header p { font-size: 12px; color: #888; }

    .dot { width: 7px; height: 7px; background: #1D9E75; border-radius: 50%; margin-left: auto; }

    .mode-bar {
      background: #f8f7f2;
      border-bottom: 1px solid #e5e3db;
      padding: 8px 20px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .mode-label { font-size: 12px; color: #888; margin-right: 4px; }

    .mode-btn {
      font-size: 12px; padding: 4px 12px;
      border-radius: 99px; border: 1px solid #d5d3ca;
      background: transparent; color: #666;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
    }

    .mode-btn.active { background: #1D9E75; border-color: #1D9E75; color: #fff; }

    .subject-select {
      margin-left: auto; font-size: 12px;
      padding: 4px 10px;
      border-radius: 8px;
      border: 1px solid #d5d3ca;
      background: #fff; color: #666;
      font-family: 'DM Sans', sans-serif;
    }

    .chips {
      padding: 10px 20px 0;
      display: flex; gap: 8px; flex-wrap: wrap;
    }

    .chip {
      font-size: 12px; padding: 5px 12px;
      border-radius: 99px; border: 1px solid #d5d3ca;
      background: #f8f7f2; color: #666;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
    }

    .chip:hover { border-color: #1D9E75; color: #0F6E56; background: #E1F5EE; }

    .chat {
      flex: 1; overflow-y: auto;
      padding: 20px;
      display: flex; flex-direction: column;
      gap: 16px;
      min-height: 320px;
      max-height: 420px;
    }

    .msg { display: flex; gap: 10px; align-items: flex-start; animation: up 0.2s ease; }
    .msg.user { flex-direction: row-reverse; }

    @keyframes up {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .m-av {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #f0ede6;
      border: 1px solid #e5e3db;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: #888; flex-shrink: 0;
    }

    .msg.bot .m-av { background: #E1F5EE; color: #0F6E56; border-color: #5DCAA5; }

    .bubble {
      max-width: 74%; padding: 10px 14px;
      border-radius: 14px; font-size: 14px;
      line-height: 1.65; color: #1a1a18;
      background: #fff; border: 1px solid #e5e3db;
    }

    .msg.user .bubble {
      background: #1D9E75; color: #fff;
      border-color: #1D9E75;
      border-radius: 14px 14px 4px 14px;
    }

    .msg.bot .bubble { border-radius: 14px 14px 14px 4px; }

    .step { display: flex; gap: 8px; margin: 5px 0; align-items: flex-start; }

    .sn {
      background: #E1F5EE; color: #0F6E56;
      border-radius: 50%; width: 20px; height: 20px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 500;
      flex-shrink: 0; margin-top: 2px;
    }

    .thinking { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
    .td { width: 7px; height: 7px; border-radius: 50%; background: #9FE1CB; animation: b 1.2s infinite; }
    .td:nth-child(2) { animation-delay: 0.2s; }
    .td:nth-child(3) { animation-delay: 0.4s; }
    @keyframes b { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

    .input-bar {
      background: #fff;
      border-top: 1px solid #e5e3db;
      padding: 12px 16px;
      display: flex; gap: 10px; align-items: center;
    }

    .qinput {
      flex: 1;
      border: 1px solid #d5d3ca;
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 14px; font-family: 'DM Sans', sans-serif;
      background: #f8f7f2; color: #1a1a18;
      outline: none; transition: border-color 0.15s;
    }

    .qinput:focus { border-color: #1D9E75; }

    .send-btn {
      width: 36px; height: 36px;
      border-radius: 50%; background: #1D9E75;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s, background 0.15s;
    }

    .send-btn:hover { background: #0F6E56; }
    .send-btn:active { transform: scale(0.93); }

    svg.si { width:16px; height:16px; fill:none; stroke:#fff; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  </style>
</head>
<body>
<div class="shell">
  <div class="header">
    <div class="avatar">🎓</div>
    <div>
      <h1>LearnLite</h1>
      <p>Powered by Gemma 4 · Offline</p>
    </div>
    <div class="dot"></div>
  </div>

  <div class="mode-bar">
    <span class="mode-label">Mode:</span>
    <button class="mode-btn active" onclick="setMode('normal',this)">Normal</button>
    <button class="mode-btn" onclick="setMode('simple',this)">Simple (age 8)</button>
    <button class="mode-btn" onclick="setMode('advanced',this)">Advanced</button>
    <select class="subject-select" id="subject">
      <option value="general">All subjects</option>
      <option value="Mathematics">Mathematics</option>
      <option value="Science">Science</option>
      <option value="History">History</option>
      <option value="English">English</option>
    </select>
  </div>

  <div class="chips" id="chips">
    <button class="chip" onclick="useChip(this)">Why is the sky blue?</button>
    <button class="chip" onclick="useChip(this)">What is photosynthesis?</button>
    <button class="chip" onclick="useChip(this)">Explain gravity</button>
  </div>

  <div class="chat" id="chat">
    <div class="msg bot">
      <div class="m-av">T</div>
      <div class="bubble">Hello! I'm your AI tutor. Ask me anything and I'll explain it step by step. What would you like to learn today?</div>
    </div>
  </div>

  <div class="input-bar">
    <input class="qinput" id="qinput" type="text" placeholder="Ask a question..." onkeydown="if(event.key==='Enter')sendMsg()"/>
    <button class="send-btn" onclick="sendMsg()">
      <svg class="si" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script>
  const API = "http://127.0.0.1:8000";
  let mode = "normal";

  function setMode(m, btn) {
    mode = m;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function useChip(btn) {
    document.getElementById('qinput').value = btn.textContent;
    sendMsg();
  }

  function addMsg(content, role) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    const av = document.createElement('div');
    av.className = 'm-av';
    av.textContent = role === 'user' ? 'U' : 'T';
    const bub = document.createElement('div');
    bub.className = 'bubble';
    if (typeof content === 'string') {
      bub.textContent = content;
    } else {
      content.split('\n').filter(l => l.trim()).forEach((line, i) => {
        const s = document.createElement('div');
        s.className = 'step';
        const sn = document.createElement('span');
        sn.className = 'sn';
        sn.textContent = i + 1;
        const sp = document.createElement('span');
        sp.textContent = line.replace(/^\d+[\.\)]\s*/, '');
        s.appendChild(sn); s.appendChild(sp);
        bub.appendChild(s);
      });
    }
    div.appendChild(av); div.appendChild(bub);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function addThinking() {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'msg bot'; div.id = 'thinking';
    div.innerHTML = '<div class="m-av">T</div><div class="bubble"><div class="thinking"><div class="td"></div><div class="td"></div><div class="td"></div></div></div>';
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  async function sendMsg() {
    const inp = document.getElementById('qinput');
    const q = inp.value.trim();
    if (!q) return;
    inp.value = '';
    document.getElementById('chips').style.display = 'none';
    addMsg(q, 'user');
    addThinking();

    try {
      const subject = document.getElementById('subject').value;
      const res = await fetch(`${API}/ask?question=${encodeURIComponent(q)}&mode=${mode}&subject=${encodeURIComponent(subject)}`, { method: 'POST' });
      const data = await res.json();
      document.getElementById('thinking')?.remove();
      addMsg(data.answer, 'bot');
    } catch (e) {
      document.getElementById('thinking')?.remove();
      addMsg("Couldn't reach the backend. Make sure Ollama and uvicorn are running!", 'bot');
    }
  }
</script>
</body>
</html>
