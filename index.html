<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LearnLite</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f4f3ee;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px 16px;
    }

    .shell {
      width: 100%; max-width: 660px;
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e5e3db;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    }

    /* ── header ── */
    .hdr {
      background: #fff;
      border-bottom: 1px solid #e5e3db;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .hdr-av {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: #1D9E75;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }

    .hdr-info h1 {
      font-family: 'Lora', serif;
      font-size: 15px; font-weight: 500;
      color: #1a1a18;
    }

    .hdr-info p { font-size: 12px; color: #888; }

    .offline-badge {
      margin-left: auto;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 99px;
      background: #E1F5EE;
      color: #085041;
      border: 1px solid #5DCAA5;
      display: flex; align-items: center; gap: 5px;
    }

    .offline-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #1D9E75;
    }

    /* ── controls ── */
    .controls {
      background: #f8f7f2;
      border-bottom: 1px solid #e5e3db;
      padding: 10px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .ctrl-group {
      display: flex; flex-direction: column; gap: 3px;
    }

    .ctrl-label {
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .ctrl-group select {
      font-size: 13px;
      padding: 5px 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
      background: #fff;
      color: #333;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
    }

    .level-btns { display: flex; gap: 5px; }

    .lvl-btn {
      font-size: 12px; padding: 5px 12px;
      border-radius: 99px;
      border: 1px solid #d5d3ca;
      background: transparent; color: #666;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.14s;
    }

    .lvl-btn.active {
      background: #1D9E75;
      border-color: #1D9E75;
      color: #fff;
    }

    /* ── chips ── */
    .chips {
      padding: 10px 20px 0;
      display: flex; gap: 8px; flex-wrap: wrap;
    }

    .chip {
      font-size: 12px; padding: 5px 12px;
      border-radius: 99px;
      border: 1px solid #d5d3ca;
      background: #f8f7f2; color: #666;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.14s;
    }

    .chip:hover { border-color: #1D9E75; color: #0F6E56; background: #E1F5EE; }

    /* ── chat ── */
    .chat {
      flex: 1; overflow-y: auto;
      padding: 20px;
      display: flex; flex-direction: column;
      gap: 16px;
      min-height: 300px;
      max-height: 420px;
    }

    .msg { display: flex; gap: 10px; align-items: flex-start; animation: fadeUp 0.2s ease; }
    .msg.user { flex-direction: row-reverse; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .m-av {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #f0ede6; border: 1px solid #e5e3db;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: #888; flex-shrink: 0;
    }

    .msg.bot .m-av { background: #E1F5EE; color: #0F6E56; border-color: #5DCAA5; }

    .bubble {
      max-width: 76%; padding: 10px 14px;
      border-radius: 14px; font-size: 14px;
      line-height: 1.65; color: #1a1a18;
      background: #fff; border: 1px solid #e5e3db;
    }

    .msg.user .bubble {
      background: #1D9E75; color: #fff;
      border-color: #1D9E75;
      border-radius: 14px 14px 4px 14px;
    }

    .msg.bot .bubble { border-radius: 14px 14px 14px 4px; }

    .step { display: flex; gap: 8px; margin: 5px 0; align-items: flex-start; }

    .sn {
      background: #E1F5EE; color: #0F6E56;
      border-radius: 50%; width: 20px; height: 20px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 500;
      flex-shrink: 0; margin-top: 2px;
    }

    .lang-tag {
      display: inline-block;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 99px;
      background: #faeeda;
      color: #633806;
      border: 1px solid #EF9F27;
      margin-bottom: 6px;
    }

    .thinking { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
    .td { width: 7px; height: 7px; border-radius: 50%; background: #9FE1CB; animation: bounce 1.2s infinite; }
    .td:nth-child(2) { animation-delay: 0.2s; }
    .td:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

    /* ── input bar ── */
    .ibar {
      background: #fff;
      border-top: 1px solid #e5e3db;
      padding: 12px 16px;
      display: flex; gap: 10px; align-items: center;
    }

    .qinput {
      flex: 1;
      border: 1px solid #d5d3ca;
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      background: #f8f7f2; color: #1a1a18;
      outline: none; transition: border-color 0.15s;
    }

    .qinput:focus { border-color: #1D9E75; }

    .send-btn {
      width: 36px; height: 36px;
      border-radius: 50%; background: #1D9E75;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s, background 0.15s; flex-shrink: 0;
    }

    .send-btn:hover { background: #0F6E56; }
    .send-btn:active { transform: scale(0.93); }

    svg.si { width:16px; height:16px; fill:none; stroke:#fff; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  </style>
</head>
<body>

<div class="shell">

  <!-- header -->
  <div class="hdr">
    <div class="hdr-av">&#127979;</div>
    <div class="hdr-info">
      <h1>LearnLite</h1>
      <p>Powered by Gemma 4 via Ollama</p>
    </div>
    <div class="offline-badge">
      <div class="offline-dot"></div>
      Running offline
    </div>
  </div>

  <!-- controls -->
  <div class="controls">
    <div class="ctrl-group">
      <span class="ctrl-label">Level</span>
      <div class="level-btns">
        <button class="lvl-btn" onclick="setLevel('beginner',this)">Beginner</button>
        <button class="lvl-btn active" onclick="setLevel('intermediate',this)">Student</button>
        <button class="lvl-btn" onclick="setLevel('advanced',this)">Advanced</button>
      </div>
    </div>

    <div class="ctrl-group">
      <span class="ctrl-label">Subject</span>
      <select id="subject">
        <option value="general">All subjects</option>
        <option value="Science">Science</option>
        <option value="Mathematics">Mathematics</option>
        <option value="History">History</option>
        <option value="English">English</option>
        <option value="Physics">Physics</option>
        <option value="Chemistry">Chemistry</option>
        <option value="Biology">Biology</option>
      </select>
    </div>

    <div class="ctrl-group">
      <span class="ctrl-label">Language</span>
      <select id="language">
        <option value="English">English</option>
        <option value="Hindi">Hindi</option>
        <option value="Tamil">Tamil</option>
      </select>
    </div>
  </div>

  <!-- chips -->
  <div class="chips" id="chips">
    <button class="chip" onclick="useChip(this)">What is photosynthesis?</button>
    <button class="chip" onclick="useChip(this)">Explain gravity</button>
    <button class="chip" onclick="useChip(this)">Solve 2x + 5 = 15</button>
    <button class="chip" onclick="useChip(this)">Why is the sky blue?</button>
  </div>

  <!-- chat -->
  <div class="chat" id="chat">
    <div class="msg bot">
      <div class="m-av">T</div>
      <div class="bubble">
        Namaste! I'm your AI tutor. I can explain topics in English, Hindi, or Tamil — at any level you choose. What would you like to learn today?
      </div>
    </div>
  </div>

  <!-- input -->
  <div class="ibar">
    <input class="qinput" id="qinput" type="text" placeholder="Ask a question in any language..." onkeydown="if(event.key==='Enter') sendMsg()"/>
    <button class="send-btn" onclick="sendMsg()">
      <svg class="si" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>

</div>

<script>
  const API = "http://127.0.0.1:8000";
  let currentLevel = "intermediate";

  function setLevel(l, btn) {
    currentLevel = l;
    document.querySelectorAll('.lvl-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function useChip(btn) {
    document.getElementById('qinput').value = btn.textContent;
    sendMsg();
  }

  function addMsg(content, role, language) {
    const chat = document.getElementById('chat');
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + role;

    const av = document.createElement('div');
    av.className = 'm-av';
    av.textContent = role === 'user' ? 'U' : 'T';

    const bub = document.createElement('div');
    bub.className = 'bubble';

    if (role === 'bot' && language && language !== 'English') {
      const tag = document.createElement('span');
      tag.className = 'lang-tag';
      tag.textContent = language;
      bub.appendChild(tag);
    }

    if (typeof content === 'string') {
      const lines = content.split('\n').map(l => l.trim()).filter(Boolean);
      lines.forEach((line, i) => {
        const cleaned = line.replace(/^\d+[\.\)]\s*/, '');
        if (!cleaned) return;
        if (lines.length > 1) {
          const s = document.createElement('div');
          s.className = 'step';
          const sn = document.createElement('span');
          sn.className = 'sn';
          sn.textContent = i + 1;
          const sp = document.createElement('span');
          sp.textContent = cleaned;
          s.appendChild(sn); s.appendChild(sp);
          bub.appendChild(s);
        } else {
          bub.appendChild(document.createTextNode(cleaned));
        }
      });
    } else {
      bub.textContent = content;
    }

    wrap.appendChild(av);
    wrap.appendChild(bub);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
  }

  function addThinking() {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'msg bot'; div.id = 'thinking';
    div.innerHTML = '<div class="m-av">T</div><div class="bubble"><div class="thinking"><div class="td"></div><div class="td"></div><div class="td"></div></div></div>';
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  async function sendMsg() {
    const inp = document.getElementById('qinput');
    const q = inp.value.trim();
    if (!q) return;
    inp.value = '';
    document.getElementById('chips').style.display = 'none';
    addMsg(q, 'user');
    addThinking();

    const subject  = document.getElementById('subject').value;
    const language = document.getElementById('language').value;

    try {
      const params = new URLSearchParams({ question: q, level: currentLevel, subject, language });
      const res = await fetch(`${API}/ask?${params}`, { method: 'POST' });
      const data = await res.json();
      document.getElementById('thinking')?.remove();
      addMsg(data.answer, 'bot', data.language);
    } catch (e) {
      document.getElementById('thinking')?.remove();
      addMsg("Cannot reach the backend. Make sure Ollama is running and uvicorn app:app --reload is started.", 'bot');
    }
  }
</script>
</body>
</html>
